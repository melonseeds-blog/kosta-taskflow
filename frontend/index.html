<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236366f1'/><text y='72' x='50' text-anchor='middle' font-size='60'>✓</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .task-card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
    .task-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.08); }
    .header-bg { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .btn-primary:hover { background: linear-gradient(135deg, #4f46e5, #7c3aed); }
    .filter-btn.active { background: #6366f1; color: white; }
    details > summary { list-style: none; }
    details > summary::-webkit-details-marker { display: none; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- 헤더 -->
  <div class="header-bg text-white py-8 px-4 shadow-lg">
    <div class="max-w-2xl mx-auto flex items-end justify-between">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">TaskFlow</h1>
        <p class="text-indigo-200 text-xs mt-1">업무를 체계적으로 관리하세요</p>
      </div>
      <!-- 저장 / 불러오기 버튼 -->
      <div class="flex gap-2">
        <button onclick="exportTasks()" class="text-xs bg-white/20 hover:bg-white/30 text-white font-medium px-3 py-1.5 rounded-lg transition flex items-center gap-1">
          ⬇ 내보내기
        </button>
        <label class="text-xs bg-white/20 hover:bg-white/30 text-white font-medium px-3 py-1.5 rounded-lg transition cursor-pointer flex items-center gap-1">
          ⬆ 불러오기
          <input type="file" accept=".json" onchange="importTasks(event)" class="hidden" />
        </label>
      </div>
    </div>
  </div>

  <div class="max-w-2xl mx-auto px-4 pb-16 mt-6">

    <!-- 업무 추가 카드 -->
    <details class="bg-white rounded-2xl shadow-sm border border-gray-100 mb-5" open>
      <summary class="flex items-center justify-between px-5 py-4 cursor-pointer select-none">
        <span class="text-sm font-semibold text-gray-500 uppercase tracking-widest">새 업무 추가</span>
        <span class="text-gray-300 text-lg">＋</span>
      </summary>
      <div class="px-5 pb-5 space-y-3">
        <input id="taskInput" type="text" placeholder="어떤 업무를 하실 건가요?"
          class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-700 placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent" />

        <textarea id="memoInput" placeholder="메모 (선택)" rows="2"
          class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-700 placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent resize-none"></textarea>

        <div class="flex gap-3 items-end">
          <div class="flex-1">
            <label class="text-xs font-medium text-gray-400 mb-1 block">우선순위</label>
            <select id="priorityInput"
              class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm text-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent">
              <option value="high">🔴 높음</option>
              <option value="medium" selected>🟡 보통</option>
              <option value="low">🟢 낮음</option>
            </select>
          </div>
          <div class="flex-1">
            <label class="text-xs font-medium text-gray-400 mb-1 block">시작일</label>
            <input id="startDateInput" type="date"
              class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm text-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          </div>
          <div class="flex-1">
            <label class="text-xs font-medium text-gray-400 mb-1 block">완료 예정일</label>
            <input id="dueDateInput" type="date"
              class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm text-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          </div>
          <button onclick="addTask()"
            class="btn-primary text-white font-semibold px-5 py-2.5 rounded-xl transition text-sm shadow-md shadow-indigo-200 flex-shrink-0">
            추가
          </button>
        </div>
      </div>
    </details>

    <!-- 통계 -->
    <div id="statsBar" class="flex gap-2 mb-4"></div>

    <!-- 검색 + 필터 + 토글 -->
    <div class="flex flex-col gap-2 mb-4">
      <input id="searchInput" type="text" placeholder="🔍 업무 검색..."
        oninput="applyFilter()"
        class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white" />

      <div class="flex items-center justify-between">
        <div class="flex gap-2">
          <button onclick="setFilter('all')"   id="filter-all"         class="filter-btn active text-xs px-3 py-1.5 rounded-lg border border-gray-200 bg-white text-gray-500 font-medium transition">전체</button>
          <button onclick="setFilter('todo')"  id="filter-todo"        class="filter-btn text-xs px-3 py-1.5 rounded-lg border border-gray-200 bg-white text-gray-500 font-medium transition">할 일</button>
          <button onclick="setFilter('in_progress')" id="filter-in_progress" class="filter-btn text-xs px-3 py-1.5 rounded-lg border border-gray-200 bg-white text-gray-500 font-medium transition">진행 중</button>
          <button onclick="setFilter('done')"  id="filter-done"        class="filter-btn text-xs px-3 py-1.5 rounded-lg border border-gray-200 bg-white text-gray-500 font-medium transition">완료</button>
        </div>
        <label class="flex items-center gap-2 text-xs text-gray-400 cursor-pointer select-none">
          <input type="checkbox" id="hideDone" onchange="applyFilter()" class="rounded" />
          완료 숨기기
        </label>
      </div>
    </div>

    <!-- 업무 목록 -->
    <ul id="taskList" class="space-y-3"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
